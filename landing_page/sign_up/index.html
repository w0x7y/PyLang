<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyLang - Sign Up</title>
  <meta name="description" content="Create your free PyLang account and start learning Python today." />
  <link rel="stylesheet" href="css/sign_up.css" />
</head>
<body>

  <!-- ── Logo / Page Header ─────────────────────────────────────── -->
  <header class="page-header">
    <a href="../index.html">
      <span class="logo-wordmark">PyLang</span>
    </a>
    <p class="logo-tagline">Master Python. One bite at a time.</p>
  </header>

  <!-- ── Auth Card ──────────────────────────────────────────────── -->
  <div class="auth-card" role="main">

    <!-- Tabs -->
    <nav class="auth-tabs" aria-label="Authentication options">
      <button
        class="tab-btn"
        id="tab-login"
        aria-selected="false"
        onclick="window.location.href='../log_in/index.html'"
      >
        Log in
      </button>
      <button
        class="tab-btn active"
        id="tab-signup"
        aria-selected="true"
      >
        Sign Up
      </button>
    </nav>

    <!-- Form -->
    <form class="auth-form" id="signup-form" novalidate>

      <!-- Full Name -->
      <div class="field">
        <label class="field-label" for="fullName">Full Name</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon" aria-hidden="true">person</span>
          <input
            class="auth-input"
            id="fullName"
            name="fullName"
            type="text"
            placeholder="Your Name"
            autocomplete="name"
            required
          />
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon" aria-hidden="true">mail</span>
          <input
            class="auth-input"
            id="email"
            name="email"
            type="email"
            placeholder="this@example.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <div class="field-header">
          <label class="field-label" for="password">Password</label>
          <a class="field-link" href="#">Forgot?</a>
        </div>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon" aria-hidden="true">lock</span>
          <input
            class="auth-input"
            id="password"
            name="password"
            type="password"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          />
        </div>
      </div>

      <button class="squish-btn squish-btn-primary" type="submit">
        Create Account
      </button>

    </form>

    <!-- Divider -->
    <div class="divider" aria-hidden="true">
      <hr class="divider-line" />
      <span class="divider-label">Or</span>
      <hr class="divider-line" />
    </div>

    <!-- Social Auth -->
    <div class="social-buttons">

      <button class="squish-btn squish-btn-secondary" type="button" aria-label="Continue with Google">
        <!-- Google SVG -->
        <svg class="social-btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <button class="squish-btn squish-btn-secondary" type="button" aria-label="Continue with Facebook">
        <!-- Facebook SVG -->
        <svg class="social-btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
        </svg>
        Continue with Facebook
      </button>

    </div>
  </div>

  <!-- ── Bottom Link ─────────────────────────────────────────────── -->
  <div class="bottom-link">
    <p>Already have an account? <a href="../index.html">Login</a></p>
  </div>

</body>
</html>
