<!DOCTYPE html>
<html>
<head>
    <title>Learn - PyLang</title>
    <link rel="stylesheet" href="./css/learn.css">
    <script src="./js/learn.js" defer></script>
</head>
<body>

    <div id="sidebar-container"></div>

    <main>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

        <div class="nav-banner">
            <div class="stats-container">
                <div class="stat-item text-secondary">
                    <span class="material-symbols-outlined icon-filled">local_fire_department</span>
                    <span id="streak-counter">0</span>
                </div>
                
                <div class="divider"></div>
                
                <div class="stat-item text-tertiary">
                    <span class="material-symbols-outlined icon-filled">diamond</span>
                    <span id="diamond-counter">0</span>
                </div>
                
                <div class="divider"></div>
                
                <div class="stat-item text-error">
                    <span class="material-symbols-outlined icon-filled">person</span>
                    <span id="friend-counter">0</span>
                </div>
            </div>
        </div>

        <div class="path-container">
            <svg viewBox="0 0 1500 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                
                <polyline id="segment-0" points="0,300 300,300" fill="none" stroke-width="12" stroke-linecap="square" />
                
                <polyline id="segment-1" points="300,300 300,50" fill="none" stroke-width="12" stroke-linecap="square" />
                
                <polyline id="segment-2" points="300,50 600,50" fill="none" stroke-width="12" stroke-linecap="square" />
                
                <polyline id="segment-3" points="600,50 600,550" fill="none" stroke-width="12" stroke-linecap="square" />
                
                <polyline id="segment-4" points="600,550 900,550" fill="none" stroke-width="12" stroke-linecap="square" />
                
                <polyline id="segment-5" points="900,550 900,50" fill="none" stroke-width="12" stroke-linecap="square" />
                
                <polyline id="segment-6" points="900,50 1200,50" fill="none" stroke-width="12" stroke-linecap="square" />
                
                <polyline id="segment-7" points="1200,50 1200,300" fill="none" stroke-width="12" stroke-linecap="square" />
                
                <polyline id="segment-8" points="1200,300 1500,300" fill="none" stroke-width="12" stroke-linecap="square" />
                

                <g class="path-node" onclick="openTask(1)" transform="translate(300, 300)">
                    <rect x="-25" y="-25" width="50" height="50" rx="8" />
                    <foreignObject x="-20" y="-20" width="40" height="40">
                        <div class="node-icon-wrapper">
                            <span class="material-symbols-outlined icon-filled">check</span>
                        </div>
                    </foreignObject>
                </g>

                <g class="path-node" onclick="openTask(2)" transform="translate(300, 50)">
                    <rect x="-25" y="-25" width="50" height="50" rx="8" />
                    <foreignObject x="-20" y="-20" width="40" height="40">
                        <div class="node-icon-wrapper">
                            <span class="material-symbols-outlined icon-filled">lock_open</span>
                        </div>
                    </foreignObject>
                </g>

                <g class="path-node" onclick="openTask(3)" transform="translate(600, 50)">
                    <rect x="-25" y="-25" width="50" height="50" rx="8" />
                    <foreignObject x="-20" y="-20" width="40" height="40">
                        <div class="node-icon-wrapper">
                            <span class="material-symbols-outlined icon-filled">lock</span>
                        </div>
                    </foreignObject>
                </g>

                <g class="path-node" onclick="openTask(4)" transform="translate(600, 550)">
                    <rect x="-25" y="-25" width="50" height="50" rx="8" />
                    <foreignObject x="-20" y="-20" width="40" height="40">
                        <div class="node-icon-wrapper">
                            <span class="material-symbols-outlined icon-filled">lock</span>
                        </div>
                    </foreignObject>
                </g>

                <g class="path-node" onclick="openTask(5)" transform="translate(900, 550)">
                    <rect x="-25" y="-25" width="50" height="50" rx="8" />
                    <foreignObject x="-20" y="-20" width="40" height="40">
                        <div class="node-icon-wrapper">
                            <span class="material-symbols-outlined icon-filled">lock</span>
                        </div>
                    </foreignObject>
                </g>

                <g class="path-node" onclick="openTask(6)" transform="translate(900, 50)">
                    <rect x="-25" y="-25" width="50" height="50" rx="8" />
                    <foreignObject x="-20" y="-20" width="40" height="40">
                        <div class="node-icon-wrapper">
                            <span class="material-symbols-outlined icon-filled">lock</span>
                        </div>
                    </foreignObject>
                </g>

                <g class="path-node" onclick="openTask(7)" transform="translate(1200, 50)">
                    <rect x="-25" y="-25" width="50" height="50" rx="8" />
                    <foreignObject x="-20" y="-20" width="40" height="40">
                        <div class="node-icon-wrapper">
                            <span class="material-symbols-outlined icon-filled">lock</span>
                        </div>
                    </foreignObject>
                </g>

                <g class="path-node" onclick="openTask(8)" transform="translate(1200, 300)">
                    <rect x="-25" y="-25" width="50" height="50" rx="8" />
                    <foreignObject x="-20" y="-20" width="40" height="40">
                        <div class="node-icon-wrapper">
                            <span class="material-symbols-outlined icon-filled">lock</span>
                        </div>
                    </foreignObject>
                </g>
                
            </svg>
        </div>
        
        <div class="unit-card">
            <div class="unit-title">Unit 1</div>
            <div class="unit-subtitle">Intro to Python & Print Statements</div>
            <div class="unit-progress-bar">
                <div id="unit-progress" class="unit-progress-fill"></div>
            </div>
        </div>

    </main>

    <script>
        function openTask(taskId) {
            alert("Opening task number: " + taskId);
            // In reality, you'd route the user here:
            // window.location.href = `/tasks/${taskId}`;
        }
    </script>

    <script src="../components/js/loadSidebar.js"></script>
</body>
</html>
