<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
<link rel="stylesheet" href="/PyLang/Code/css/code.css">

<div class="code-shell">
    <div class="code-topbar">
        <div class="code-topbar__left">
            <h1>Code Runner</h1>
            <p>Write Python below and click Run &mdash; output appears in the terminal.</p>
        </div>
        <button class="btn-run" id="btn-run" title="Run (Ctrl+Enter)">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 2.5a.5.5 0 0 1 .757-.429l10 5.5a.5.5 0 0 1 0 .858l-10 5.5A.5.5 0 0 1 3 13.5v-11z"/>
            </svg>
            Run
        </button>
    </div>

    <div class="code-workspace">
        <div class="editor-panel" id="editor-panel">
            <div class="panel-header">
                <span class="panel-header__title">main.py</span>
            </div>
            <div class="editor-wrap">
                <textarea id="code-editor"></textarea>
            </div>
        </div>

        <div class="resize-handle" id="resize-handle"></div>

        <div class="terminal-panel" id="terminal-panel">
            <div class="panel-header">
                <span class="panel-header__title">output</span>
            </div>
            <div class="terminal-body" id="terminal-body"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/skulpt@latest/dist/skulpt.min.js"></script>
<script src="https://unpkg.com/skulpt@latest/dist/skulpt-stdlib.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>

<script>
(() => {
    const editorElement = document.getElementById("code-editor");
    const termBody = document.getElementById("terminal-body");
    const btnRun = document.getElementById("btn-run");
    const handle = document.getElementById("resize-handle");
    const editorPanel = document.getElementById("editor-panel");
    const termPanel = document.getElementById("terminal-panel");

    if (!editorElement || !termBody || !btnRun || !window.CodeMirror) {
        return;
    }

    const editor = CodeMirror.fromTextArea(editorElement, {
        mode: "python",
        lineNumbers: true,
        indentUnit: 4,
        tabSize: 4,
        indentWithTabs: false,
        autoCloseBrackets: true,
        matchBrackets: true,
        styleActiveLine: true,
        lineWrapping: false,
        extraKeys: {
            "Tab": cm => cm.execCommand("indentMore"),
            "Shift-Tab": cm => cm.execCommand("indentLess"),
            "Ctrl-Enter": () => runCode(),
            "Cmd-Enter": () => runCode(),
            "Ctrl-/": cm => cm.execCommand("toggleComment"),
        }
    });

    editor.setValue(`# Welcome to PyLang Code Runner!
# Press Ctrl+Enter or click Run to execute.

print("Hello, PyLang!")
`);

    setTimeout(() => editor.refresh(), 50);

    function termClear() {
        termBody.innerHTML = "";
    }

    function termLine(text, cls = "stdout") {
        const div = document.createElement("div");
        div.className = `t-line t-line--${cls}`;
        div.textContent = text;
        termBody.appendChild(div);
        termBody.scrollTop = termBody.scrollHeight;
    }

    function termTypeLine(text, cls = "system", delay = 0) {
        return new Promise(resolve => {
            setTimeout(() => {
                const div = document.createElement("div");
                div.className = `t-line t-line--${cls}`;
                termBody.appendChild(div);
                let i = 0;
                const iv = setInterval(() => {
                    div.textContent += text[i++];
                    termBody.scrollTop = termBody.scrollHeight;
                    if (i >= text.length) {
                        clearInterval(iv);
                        resolve();
                    }
                }, 18);
            }, delay);
        });
    }

    function showIdleCursor() {
        removeIdleCursor();
        const div = document.createElement("div");
        div.className = "t-line t-line--system t-cursor-line";
        div.innerHTML = '<span class="t-cursor"></span>';
        div.id = "idle-cursor";
        termBody.appendChild(div);
        termBody.scrollTop = termBody.scrollHeight;
    }

    function removeIdleCursor() {
        const el = document.getElementById("idle-cursor");
        if (el) {
            el.remove();
        }
    }

    async function termBoot() {
        termClear();
        await termTypeLine("PyLang Terminal  v1.0", "system", 0);
        await termTypeLine("Python 3 (Skulpt)  - ready.", "system", 60);
        termLine("", "system");
        showIdleCursor();
    }

    function termAskInput(prompt) {
        return new Promise(resolve => {
            removeIdleCursor();

            const row = document.createElement("div");
            row.className = "t-prompt-row";

            const sym = document.createElement("span");
            sym.className = "t-prompt-symbol";
            sym.textContent = prompt || "> ";

            const inp = document.createElement("input");
            inp.className = "t-input";
            inp.type = "text";
            inp.autocomplete = "off";
            inp.spellcheck = false;

            row.appendChild(sym);
            row.appendChild(inp);
            termBody.appendChild(row);
            termBody.scrollTop = termBody.scrollHeight;
            inp.focus();

            inp.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    const val = inp.value;
                    row.remove();
                    const echo = document.createElement("div");
                    echo.className = "t-line t-line--stdout";
                    echo.textContent = (prompt || "> ") + val;
                    termBody.appendChild(echo);
                    termBody.scrollTop = termBody.scrollHeight;
                    resolve(val);
                }
            });
        });
    }

    function configureSkulpt() {
        Sk.configure({
            output(text) {
                const lines = text.split("\n");
                lines.forEach((ln, i) => {
                    if (i === lines.length - 1 && ln === "") {
                        return;
                    }
                    termLine(ln, "stdout");
                });
            },
            inputfun(prompt) {
                return termAskInput(prompt);
            },
            inputfunTakesPrompt: true,
            read(file) {
                if (Sk.builtinFiles === undefined ||
                    Sk.builtinFiles.files[file] === undefined) {
                    throw new Error(`File not found: '${file}'`);
                }
                return Sk.builtinFiles.files[file];
            },
            execLimit: 30000,
        });
    }

    async function runCode() {
        if (btnRun.classList.contains("running")) {
            return;
        }

        const src = editor.getValue();
        if (!src.trim()) {
            return;
        }

        termClear();
        removeIdleCursor();

        await termTypeLine("Running main.py...", "info", 0);
        termLine("", "system");

        btnRun.classList.add("running");
        btnRun.innerHTML = `
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="4" height="10" rx="1"/>
                <rect x="9" y="3" width="4" height="10" rx="1"/>
            </svg>
            Running...`;

        configureSkulpt();

        try {
            await Sk.misceval.asyncToPromise(() =>
                Sk.importMainWithBody("<stdin>", false, src, true)
            );
        } catch (err) {
            const clean = err.toString().replace(/^.*?Error:/, m => m);
            termLine("! " + clean, "stderr");
        } finally {
            btnRun.classList.remove("running");
            btnRun.innerHTML = `
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 2.5a.5.5 0 0 1 .757-.429l10 5.5a.5.5 0 0 1 0 .858l-10 5.5A.5.5 0 0 1 3 13.5v-11z"/>
                </svg>
                Run`;
            showIdleCursor();
        }
    }

    btnRun.addEventListener("click", runCode);

    let dragging = false;
    let startX = 0;
    let startEW = 0;
    let startTW = 0;

    handle.addEventListener("mousedown", e => {
        dragging = true;
        startX = e.clientX;
        startEW = editorPanel.getBoundingClientRect().width;
        startTW = termPanel.getBoundingClientRect().width;
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";
    });

    document.addEventListener("mousemove", e => {
        if (!dragging || !document.getElementById("code-editor")) {
            return;
        }

        const dx = e.clientX - startX;
        const newEW = Math.max(200, startEW + dx);
        const newTW = Math.max(200, startTW - dx);
        editorPanel.style.flex = "none";
        editorPanel.style.width = newEW + "px";
        termPanel.style.flex = "none";
        termPanel.style.width = newTW + "px";
        editor.refresh();
    });

    document.addEventListener("mouseup", () => {
        if (!dragging) {
            return;
        }

        dragging = false;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        editor.refresh();
    });

    termBoot();
})();
</script>
