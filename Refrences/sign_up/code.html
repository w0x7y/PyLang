<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PyLang - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#6be026",
                        "surface-bright": "#2f3b40",

                        "on-primary-fixed-variant": "#1f5100",
                        "on-primary": "#133800",
                        "on-secondary-container": "#4e3e00",
                        "surface-container-highest": "#2a373c",
                        "secondary-fixed-dim": "#edc22b",
                        "on-surface": "#d7e5eb",
                        "on-surface-variant": "#becbb1",
                        "on-background": "#d7e5eb",
                        "on-secondary-fixed": "#231b00",
                        "on-tertiary": "#00315b",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-container": "#00477e",
                        "inverse-surface": "#d7e5eb",
                        "error-container": "#93000a",
                        "secondary-container": "#cfa700",
                        "surface": "#09151a",
                        "secondary-fixed": "#ffe086",
                        "on-secondary": "#3c2f00",
                        "on-secondary-fixed-variant": "#574500",
                        "secondary": "#edc22b",
                        "tertiary": "#b1d1ff",
                        "primary": "#74e930",
                        "on-tertiary-fixed-variant": "#004880",
                        "background": "#09151a",
                        "tertiary-fixed": "#d3e4ff",
                        "tertiary-container": "#7db7ff",
                        "inverse-on-surface": "#263237",
                        "surface-container-lowest": "#041015",
                        "primary-fixed-dim": "#6be026",
                        "outline-variant": "#3f4a36",
                        "on-tertiary-fixed": "#001c38",
                        "primary-container": "#58cc02",
                        "surface-dim": "#09151a",
                        "surface-container-low": "#111d22",
                        "on-primary-container": "#1e5000",
                        "tertiary-fixed-dim": "#a1c9ff",
                        "surface-container-high": "#202c31",
                        "on-primary-fixed": "#082100",
                        "on-error": "#690005",
                        "outline": "#88957d",
                        "error": "#ffb4ab",
                        "surface-container": "#152126",
                        "inverse-primary": "#2b6c00",
                        "surface-variant": "#2a373c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "space-xl": "32px",
                        "space-md": "16px",
                        "container-margin": "20px",
                        "unit": "4px",
                        "space-lg": "24px",
                        "space-xs": "4px",
                        "space-sm": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Be Vietnam Pro"],
                        "display-lg": ["Be Vietnam Pro"],
                        "label-code": ["JetBrains Mono"],
                        "headline-md": ["Be Vietnam Pro"],

                        "display-lg-mobile": ["Be Vietnam Pro"],
                        "label-caps": ["Be Vietnam Pro"]

                    "fontSize": {

                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
<style>
        .squish-btn {
            position: relative;
            transition: transform 0.1s ease;
        }
        .squish-btn:active {
            transform: translateY(4px);
        }
        .squish-btn:active::after {
            height: 0;
            bottom: 0;
        }
        .squish-btn-primary::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -4px;
            height: 4px;
            background-color: #1f5100; /* on-primary-fixed-variant approx */
            border-radius: inherit;
            z-index: -1;
            transition: all 0.1s ease;
        }
        .squish-btn-secondary::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -4px;
            height: 4px;
            background-color: #3f4a36; /* outline-variant */
            border-radius: inherit;
            z-index: -1;
            transition: all 0.1s ease;
        }
        .auth-card {
            border: 2px solid #37464F;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-container-margin selection:bg-primary-container selection:text-on-primary-container">
<!-- Pattern Background for Visual Interest -->
<div class="fixed inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, #88957d 1px, transparent 0); background-size: 32px 32px;"></div>
<!-- Header Section -->
<div class="text-center mb-space-lg z-10">
<h1 class="font-display-lg text-display-lg text-primary tracking-tighter uppercase mb-space-xs">PyLang</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Master Python. One bite at a time.</p>
</div>
<!-- Auth Card -->
<div class="w-full max-w-[480px] bg-surface auth-card rounded-xl shadow-[0_8px_0_0_#111d22] z-10 p-space-lg flex flex-col gap-space-lg relative mt-2">
<!-- Tabs -->
<div class="flex gap-space-sm border-b-2 border-surface-variant pb-space-sm">
<button class="flex-1 font-headline-md text-headline-md text-on-surface-variant py-space-sm text-center hover:text-on-surface transition-colors cursor-pointer" onclick="window.location.href='#'">
                Login
            </button>
<button class="flex-1 font-headline-md text-headline-md text-primary py-space-sm text-center border-b-4 border-primary rounded-t-lg bg-surface-container-high transition-colors cursor-default">
                Sign Up
            </button>
</div>
<!-- Form -->
<form class="flex flex-col gap-space-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-space-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-space-md top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">person</span>
<input class="w-full bg-surface-container-lowest border-2 border-surface-variant rounded-lg pl-12 pr-space-md py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-0 transition-colors" id="fullName" placeholder="Ada Lovelace" type="text"/>
</div>
</div>
<div class="flex flex-col gap-space-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-space-md top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">mail</span>
<input class="w-full bg-surface-container-lowest border-2 border-surface-variant rounded-lg pl-12 pr-space-md py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-0 transition-colors" id="email" placeholder="ada@example.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-space-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label-caps text-label-caps text-tertiary hover:text-tertiary-fixed-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-space-md top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">lock</span>
<input class="w-full bg-surface-container-lowest border-2 border-surface-variant rounded-lg pl-12 pr-space-md py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-0 transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="squish-btn squish-btn-primary w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 rounded-lg mt-space-sm uppercase tracking-wider text-center" type="submit">
                Create Account
            </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-space-sm">
<div class="flex-grow border-t-2 border-surface-variant"></div>
<span class="flex-shrink-0 mx-space-md font-label-caps text-label-caps text-on-surface-variant uppercase">Or</span>
<div class="flex-grow border-t-2 border-surface-variant"></div>
</div>
<!-- Social Auth -->
<div class="flex flex-col gap-space-sm">
<button class="squish-btn squish-btn-secondary w-full bg-surface-container-high border-2 border-surface-variant text-on-surface font-body-lg text-body-lg py-3 rounded-lg flex items-center justify-center gap-space-sm hover:bg-surface-container-highest transition-colors">
<svg class="w-6 h-6" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<button class="squish-btn squish-btn-secondary w-full bg-surface-container-high border-2 border-surface-variant text-on-surface font-body-lg text-body-lg py-3 rounded-lg flex items-center justify-center gap-space-sm hover:bg-surface-container-highest transition-colors">
<svg class="w-6 h-6" fill="#1877F2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
                Continue with Facebook
            </button>
</div>
</div>
<!-- Bottom Link -->
<div class="mt-space-lg text-center z-10">
<p class="font-body-md text-body-md text-on-surface-variant">
            Already have an account? <a class="text-primary hover:text-primary-fixed transition-colors font-bold" href="#">Login</a>
</p>
</div>
</body></html>
